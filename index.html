<!doctype html>
<html lang="sq">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Databaza New Vision Project</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <style>
      :root{
        --bg1:#06121b;
        --bg2:#0b2233;

        --card: rgba(255,255,255,.06);
        --card2: rgba(255,255,255,.08);
        --line: rgba(255,255,255,.10);

        --text:#eaf4ff;
        --muted: rgba(234,244,255,.70);

        --accent:#32d0a5;
        --accent2:#4cc3ff;

        --warn:#ffc107;
        --ok:#2bd576;

        --shadow: 0 18px 40px rgba(0,0,0,.35);
        --radius: 18px;

        --chipbg: rgba(255,255,255,.08);
      }

      body{
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(900px 500px at 16% 12%, rgba(76,195,255,.18), transparent 60%),
          radial-gradient(820px 500px at 92% 18%, rgba(50,208,165,.16), transparent 55%),
          linear-gradient(180deg, var(--bg1), var(--bg2));
        padding-top: 1.25rem;
        padding-bottom: 4.3rem;
      }

      .hidden{ display: none !important; }
      .muted{ color: var(--muted) !important; }
      .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

      /* Header (Topografik) */
      .nvp-header{
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
        box-shadow: var(--shadow);
        border-radius: var(--radius);
        padding: 16px 16px;
        position: relative;
        overflow: hidden;
      }
      .nvp-header::before{
        content:"";
        position:absolute; inset:-2px;
        background:
          /* “Contour lines” */
          repeating-linear-gradient(
            135deg,
            rgba(255,255,255,.07) 0px,
            rgba(255,255,255,.07) 1px,
            transparent 1px,
            transparent 14px
          );
        opacity:.18;
        pointer-events:none;
      }
      .brand{
        display:flex;
        align-items:center;
        gap: 12px;
      }
      .brand-title{
        margin:0;
        font-weight: 900;
        letter-spacing: .2px;
        line-height: 1.05;
      }
      .brand-sub{
        margin-top: 4px;
        font-size: 13px;
        color: var(--muted);
      }
      .brand-badge{
        display:inline-flex;
        align-items:center;
        gap:.4rem;
        padding:.18rem .6rem;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.06);
        color: var(--muted);
        font-size: 12px;
        width: fit-content;
        margin-top: 6px;
      }

      /* Cards */
      .card{
        background: linear-gradient(180deg, var(--card), rgba(255,255,255,.03));
        border: 1px solid var(--line);
        border-radius: var(--radius) !important;
        box-shadow: var(--shadow);
        color: var(--text);
      }
      .card .card-body{ padding: 16px; }

      /* Buttons */
      .btn{ border-radius: 14px; font-weight: 700; }
      .btn-primary{
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        border: 0;
        color: #041219;
      }
      .btn-primary:hover{ filter: brightness(1.05); }
      .btn-success{
        background: linear-gradient(90deg, rgba(43,213,118,.95), rgba(50,208,165,.95));
        border: 0;
        color: #041219;
      }
      .btn-outline-primary{
        border-color: rgba(76,195,255,.55);
        color: var(--text);
      }
      .btn-outline-primary:hover{
        background: rgba(76,195,255,.16);
        border-color: rgba(76,195,255,.75);
        color: var(--text);
      }
      .btn-outline-secondary{
        border-color: rgba(255,255,255,.22);
        color: var(--text);
      }
      .btn-outline-secondary:hover{
        background: rgba(255,255,255,.10);
        border-color: rgba(255,255,255,.30);
        color: var(--text);
      }

      /* Inputs */
      .form-control, .form-select{
        background: rgba(255,255,255,.06);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 14px;
      }
      .form-control::placeholder{ color: rgba(234,244,255,.55); }
      .form-control:focus, .form-select:focus{
        border-color: rgba(76,195,255,.55);
        box-shadow: 0 0 0 .2rem rgba(76,195,255,.15);
        background: rgba(255,255,255,.07);
        color: var(--text);
      }
      .form-check-input{
        background-color: rgba(255,255,255,.08);
        border: 1px solid var(--line);
      }

      /* Table */
      .table{
        --bs-table-bg: transparent;
        --bs-table-striped-bg: rgba(255,255,255,.04);
        --bs-table-border-color: rgba(255,255,255,.10);
        color: var(--text);
      }
      .table thead th{
        background: rgba(255,255,255,.06);
        color: var(--text);
        border-bottom: 1px solid rgba(255,255,255,.10);
      }

      /* KPI */
      .card-kpi{ min-height: 112px; }
      .display-6{ font-weight: 900; }

      /* Accordion */
      .accordion-item{
        border: 1px solid rgba(255,255,255,.10);
        border-radius: 16px !important;
        overflow: hidden;
        background: rgba(255,255,255,.03);
        margin-bottom: 10px;
      }
      .accordion-button{
        background: rgba(255,255,255,.05);
        color: var(--text);
        font-weight: 800;
      }
      .accordion-button:not(.collapsed){
        background: rgba(76,195,255,.10);
        color: var(--text);
      }
      .accordion-button:focus{
        box-shadow: 0 0 0 .2rem rgba(76,195,255,.12);
      }

      /* Chips */
      .chip{
        display:inline-flex;
        align-items:center;
        gap:.4rem;
        padding:.18rem .6rem;
        border-radius:999px;
        background: var(--chipbg);
        font-size:12px;
        border: 1px solid rgba(255,255,255,.10);
      }
      .chip.ok{ background: rgba(43,213,118,.12); border-color: rgba(43,213,118,.22); }
      .chip.warn{ background: rgba(255,193,7,.14); border-color: rgba(255,193,7,.22); }
      .chip.gray{ background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); }

      /* Files */
      .file-list .list-group-item{
        background: rgba(255,255,255,.03);
        border-color: rgba(255,255,255,.10);
        color: var(--text);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:.75rem;
      }
      .file-meta{ min-width:0; }
      .file-name{
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 52vw;
      }
      @media (min-width: 992px) { .file-name { max-width: 280px; } }

      /* Alerts */
      .alert{
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,.12);
      }
      .alert-info{ background: rgba(76,195,255,.08); color: var(--text); }
      .alert-success{ background: rgba(43,213,118,.10); color: var(--text); }
      .alert-warning{ background: rgba(255,193,7,.10); color: var(--text); }
      .alert-danger{ background: rgba(220,53,69,.10); color: var(--text); }

      /* Footer support */
      #support-footer{
        position: fixed;
        right: 14px;
        bottom: 10px;
        font-size: 13px;
        opacity: 0.92;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(8px);
        z-index: 9999;
        user-select: none;
        pointer-events: none;
        line-height: 1.25;
        color: var(--text);
      }

      /* Bootstrap helper override */
      .text-muted{ color: var(--muted) !important; }
